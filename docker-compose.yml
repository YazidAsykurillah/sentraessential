services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: cms-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - cms-network

  nginx:
    image: nginx:alpine
    container_name: cms-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cms-network

  mysql:
    image: mysql:8.4
    container_name: cms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cms-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cms-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    networks:
      - cms-network

  mailpit:
    image: axllent/mailpit
    container_name: cms-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cms-network

  node:
    image: node:22-alpine
    container_name: cms-node
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /var/www
    tty: true
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
    networks:
      - cms-network

volumes:
  mysql_data:

networks:
  cms-network:
    driver: bridge